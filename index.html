<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram | Perfil de viagens</title>
    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">


</head>
<body>
    <div class="bg-surface-color">
    <nav class="container">
        <a href="#" id="logo">
            <img src="./assets/Logo.svg" alt="Logomarca">
        </a>

        <ul id="primary-menu">
            <li>
                <a href="#"><img src="./assets/icons/MagnifyingGlass.svg" alt="Search"></a>
            </li>
            <li><a href="#">Explorer</a></li>
            <li><a href="#">Minhas viagens</a></li>
            <li><a href="#">
                <img src="assets/Profile pic.png" alt="Perfil do usuário">
            </a></li>

        </ul>
    </nav>

    <header>
        <div class="container">

            <div id="profile">
                <img src="./assets/Profile pic.png" alt="">
                <div>
                    <h1>Gabriel Tobler</h1>
                <p>Amante de viagens, cultura e gastronomia. 🌍✈️<br>  
Aqui compartilho as histórias registradas em cada clique, explorando cantinhos fascinantes do nosso planeta a partir da movimentada cidade de Curitiba. 🏙️📸
                
                </p>
            </div>
        </div>   
            <ul id="info">
                <li>
                    <img src="./assets/icons/MapPin.svg" alt="Icone de localização">
                    <span>Curitiba, Brazil</span>
                </li>
                
                <li>
                    <img src="./assets/icons/AirplaneTilt.svg" alt="Icone de avião">
                    <span>6 países</span>
                </li>
                
                <li>
                    <img src="./assets/icons/Image.svg" alt="Icone de Imagem">
                    <span>+200 Fotos</span>
                </li>
            </ul>

        </div>
